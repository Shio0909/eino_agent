server:
    host: 0.0.0.0
    port: 19093
    mode: release
auth:
    enabled: false
    jwt_secret: change-me-in-production
    access_token_expire_minutes: 120
    admin_tenant_id: 1
    admin_username: admin
    admin_password: change-me
    user_tenant_id: 1
    user_username: user
    user_password: change-me
llm:
    provider: openai
    base_url: https://api.siliconflow.cn/v1
    api_key: your-llm-api-key
    model_id: Pro/zai-org/GLM-5
    temperature: 0.7
    max_tokens: 4096
embedding:
    provider: openai
    base_url: https://api.siliconflow.cn/v1
    api_key: your-embedding-api-key
    model_id: BAAI/bge-m3
    dimensions: 1024
reranker:
    enabled: true
    provider: bge
    base_url: https://api.siliconflow.cn
    api_key: your-reranker-api-key
    model_id: BAAI/bge-reranker-v2-m3
    top_k: 5
    threshold: 0.5
database:
    host: 127.0.0.1
    port: 55432
    user: eino
    password: your-db-password
    dbname: eino_rag
    sslmode: disable
    milvus_addr: ""
rag:
    top_k: 10
    enable_hybrid: true
    enable_rewrite: false
    enable_rerank: true
    embedding_cache_ttl_minutes: 1440
    retrieval_cache_ttl_minutes: 10
    chunk_size: 512
    chunk_overlap: 50
    documents_path: ./data/documents
agent:
    enabled: true
    system_prompt: |
        你是一个智能助手，可以使用工具来帮助用户解决问题。
        当用户询问知识性问题时，优先使用知识库检索工具。
        当需要实时信息时，使用网络搜索工具。
    max_steps: 10
    enable_knowledge_tool: true
    enable_web_search: false
    enable_skills: true
    skills_dir: ./skills
    tavily_api_key: ""
    serp_api_key: ""
    agentic_rag:
        enabled: true
        max_retries: 3
        quality_threshold: 0.6
        enable_web_fallback: false
        max_run_steps: 20
memory:
    enabled: true
    window_size: 8
    short_term_cache_ttl_minutes: 60
    enable_long_term: false
    long_term_session_limit: 5
    long_term_messages_per_session: 2
    max_context_chars: 3000
docreader:
    enabled: true
    endpoint: localhost:50051
    max_file_size: 50
    minio_endpoint: ""
    minio_access_key: your-minio-access-key
    minio_secret_key: your-minio-secret-key
    minio_bucket: documents
    enable_multimodal: false
    vlm_base_url: ""
    vlm_api_key: ""
    vlm_model: ""
redis:
    addr: 127.0.0.1:6379
    password: ""
    db: 0
import_queue:
    enabled: true
    provider: rabbitmq
    url: amqp://guest:guest@127.0.0.1:5672/
    queue_name: knowledge_imports
    consumer_tag: eino-agent-import-worker
    temp_dir: ./data/documents/import-jobs
    prefetch_count: 1
    state_ttl_minutes: 1440
mcp:
    enabled: true
    servers:
        - name: tavily
          endpoint: https://mcp.tavily.com/mcp/
          transport: streamable_http
          command: ""
          args: []
          env: []
          api_key: "your-tavily-api-key"
          api_key_header: Authorization
          api_key_prefix: Bearer
          tool_names: []
graphrag:
    enabled: false
    neo4j_uri: bolt://localhost:7687
    neo4j_username: neo4j
    neo4j_password: your-neo4j-password
    extract_temperature: 0.1
    top_k: 10
