server:
    host: 0.0.0.0
    port: 19093
    mode: release
auth:
    enabled: false
    jwt_secret: ${JWT_SECRET:-}  # 必须设置至少 16 字符随机密钥
    access_token_expire_minutes: 120
    admin_tenant_id: 1
    admin_username: admin
    admin_password: ${ADMIN_PASSWORD:-}  # auth.enabled=true 时必须配置
    user_tenant_id: 1
    user_username: user
    user_password: ${USER_PASSWORD:-}  # auth.enabled=true 时必须配置
llm:
    provider: openai
    base_url: https://api.siliconflow.cn/v1
    api_key: your-llm-api-key
    model_id: Pro/zai-org/GLM-5
    temperature: 0.7
    max_tokens: 4096
embedding:
    provider: openai
    base_url: https://api.siliconflow.cn/v1
    api_key: your-embedding-api-key
    model_id: BAAI/bge-m3
    dimensions: 1024
reranker:
    enabled: true
    provider: bge
    base_url: https://api.siliconflow.cn
    api_key: your-reranker-api-key
    model_id: BAAI/bge-reranker-v2-m3
    top_k: 5
    threshold: 0.5
database:
    host: 127.0.0.1
    port: 55432
    user: eino
    password: your-db-password
    dbname: eino_rag
    sslmode: disable
    milvus_addr: ""
rag:
    top_k: 10
    enable_hybrid: true
    enable_rewrite: false
    enable_rerank: true
    embedding_cache_ttl_minutes: 1440
    retrieval_cache_ttl_minutes: 10
    chunk_size: 512
    chunk_overlap: 50
    chunk_strategy: auto  # recursive, markdown, auto(根据文件类型自动选择), semantic
    documents_path: ./data/documents
    # 知识库模式说明:
    # 创建 KB 时可指定 mode: "vector"(默认，使用 embedding 向量检索) 或 "markdown"(纯文本全文检索，无需 embedding)
    # markdown 模式适合: 个人知识库、Markdown 文档、不需要语义检索的场景
agent:
    enabled: true
    system_prompt: |
        你是一个智能助手，可以使用工具来帮助用户解决问题。
        当用户询问知识性问题时，优先使用知识库检索工具。
        当需要实时信息时，使用网络搜索工具。
    max_steps: 10
    max_content_per_doc: 1500  # 每篇文档返回给 Agent 的最大字符数（默认 1500）
    max_total_content: 15000   # 单次检索返回的总字符数上限（默认 15000）
    enable_conflict_detection: false  # 启用检索结果冲突检测（使用 lightModel，增加延迟）
    enable_knowledge_tool: true
    enable_web_search: false
    enable_skills: true
    skills_dir: ./skills
    tavily_api_key: ""
    serp_api_key: ""
    # 轻量模型：用于 query_decompose / conflict detection 等辅助工具
    # 留空或删除此段则所有辅助工具使用主模型
    light_llm:
        provider: openai
        base_url: https://api.siliconflow.cn/v1
        api_key: your-llm-api-key
        model_id: THUDM/GLM-4-Flash
        temperature: 0.1
        max_tokens: 1024
security:
    prompt_guard:
        enabled: true
        block_on_high: true
        downgrade_on_medium: true
        force_citation_on_medium: true
        # 自定义高风险规则（Go regexp 语法），为空则使用内置规则。
        high_risk_patterns: []
        # 自定义中风险规则（Go regexp 语法），为空则使用内置规则。
        medium_risk_patterns: []
memory:
    enabled: true
    window_size: 8
    short_term_cache_ttl_minutes: 60
    enable_long_term: false
    long_term_session_limit: 5
    long_term_messages_per_session: 2
    max_context_chars: 5000
docreader:
    enabled: true
    # mode 可选: local | grpc | auto | mineru | mineru_with_fallback
    #   local                - 纯 Go 本地解析（轻量，PDF 质量一般）
    #   grpc / auto          - 连接 WeKnora gRPC docreader
    #   mineru               - 连接 MinerU HTTP 微服务（高精度 PDF）
    #   mineru_with_fallback - MinerU 失败时降级到本地解析
    mode: local
    endpoint: localhost:50051
    # MinerU HTTP 服务端点（mode=mineru 或 mineru_with_fallback 时需填写）
    # Docker 内部地址: http://mineru:8000
    # 宿主机直接运行:  http://localhost:8500
    mineru_endpoint: ""
    max_file_size: 50
    minio_endpoint: ""
    minio_access_key: your-minio-access-key
    minio_secret_key: your-minio-secret-key
    minio_bucket: documents
    enable_multimodal: false
    vlm_base_url: ""
    vlm_api_key: ""
    vlm_model: ""
    user_agent: Mozilla/5.0 (compatible; EinoAgent/1.0)
    request_timeout_seconds: 60
    max_download_bytes: 10485760
    render_mode: auto
    playwright:
        enabled: false
        command: node
        args:
            - scripts/playwright-docreader.js
        timeout_seconds: 90
        wait_until: networkidle
        max_html_bytes: 2097152
redis:
    addr: 127.0.0.1:6379
    password: ""
    db: 0
import_queue:
    enabled: true
    provider: rabbitmq
    url: amqp://guest:guest@127.0.0.1:5672/
    queue_name: knowledge_imports
    consumer_tag: eino-agent-import-worker
    temp_dir: ./data/documents/import-jobs
    prefetch_count: 1
    state_ttl_minutes: 1440
mcp:
    enabled: true
    servers:
        - name: tavily
          endpoint: https://mcp.tavily.com/mcp/
          transport: streamable_http
          command: ""
          args: []
          env: []
          api_key: "your-tavily-api-key"
          api_key_header: Authorization
          api_key_prefix: Bearer
          tool_names: []
mcp_export:
    enabled: false
    transport: streamable_http  # sse / streamable_http / stdio
    address: ":19094"
    api_keys: []  # 可选: 配置后需要 Authorization: Bearer <key> 或 X-API-Key: <key> 认证
    api_key_scopes: []  # 推荐: 为外部 Agent 的 API Key 绑定 tenant/user/kb scope
    default_tenant_id: 0  # 未配置 API Key 时的默认租户范围；0 表示不限制
    default_user_id: ""
    default_knowledge_base_ids: []  # 未配置 API Key 时允许访问的 KB；为空表示不限制
    enable_admin_tools: false  # 默认只暴露只读/问答工具；创建、导入、删除、索引等管理工具需显式开启
    # api_key_scopes:
    #   - api_key: "sk-your-secret-key-1"
    #     tenant_id: 1
    #     user_id: "feishu-bot"
    #     knowledge_base_ids: ["kb-id-1"]
    #     allow_admin_tools: false
graphrag:
    enabled: false
    neo4j_uri: bolt://localhost:7687
    neo4j_username: neo4j
    neo4j_password: your-neo4j-password
    extract_temperature: 0.1
    top_k: 10
    # 查询时实体抽取轻量模型（可选，不配则用主模型）
    # light_llm:
    #     provider: openai
    #     base_url: https://api.siliconflow.cn/v1
    #     api_key: your-api-key
    #     model_id: Qwen/Qwen2.5-7B-Instruct
    #     temperature: 0.1
    #     max_tokens: 1024
