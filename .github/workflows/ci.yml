name: CI

on:
  push:
    branches: [main, feat/**, fix/**, refactor/**]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          cache: true
      - name: Test focused packages
        run: make test-core
      - name: Build server
        run: go build ./cmd/server

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run build
