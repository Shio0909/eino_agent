syntax = "proto3";

package docreader;

option go_package = "eino_agent/internal/docreader/proto";

// 文档读取服务
service DocReader {
  // 从文件读取文档
  rpc ReadFromFile(ReadFromFileRequest) returns (ReadResponse) {}
  // 从URL读取文档
  rpc ReadFromURL(ReadFromURLRequest) returns (ReadResponse) {}
}

// 对象存储提供方
enum StorageProvider {
  STORAGE_PROVIDER_UNSPECIFIED = 0;
  COS = 1;     // 腾讯云 COS
  MINIO = 2;   // MinIO/S3 兼容
}

// 通用对象存储配置，兼容 COS 与 MinIO
message StorageConfig {
  StorageProvider provider = 1;
  string region = 2;
  string bucket_name = 3;
  string access_key_id = 4;
  string secret_access_key = 5;
  string app_id = 6;
  string path_prefix = 7;
}

// VLM 配置 (视觉语言模型)
message VLMConfig {
  string model_name = 1;
  string base_url = 2;
  string api_key = 3;
  string interface_type = 4; // "ollama" or "openai"
}

// 读取配置
message ReadConfig {
  int32 chunk_size = 1;
  int32 chunk_overlap = 2;
  repeated string separators = 3;
  bool enable_multimodal = 4;
  StorageConfig storage_config = 5;
  VLMConfig vlm_config = 6;
}

// 从文件读取文档请求
message ReadFromFileRequest {
  bytes file_content = 1;
  string file_name = 2;
  string file_type = 3;
  ReadConfig read_config = 4;
  string request_id = 5;
}

// 从URL读取文档请求
message ReadFromURLRequest {
  string url = 1;
  string title = 2;
  ReadConfig read_config = 3;
  string request_id = 4;
}

// 图片信息
message Image {
  string url = 1;
  string caption = 2;
  string ocr_text = 3;
  string original_url = 4;
  int32 start = 5;
  int32 end = 6;
}

// 文档块
message Chunk {
  string content = 1;
  int32 seq = 2;
  int32 start = 3;
  int32 end = 4;
  repeated Image images = 5;
}

// 读取响应
message ReadResponse {
  repeated Chunk chunks = 1;
  string error = 2;
}
