basePath: /api/v1
definitions:
  handler.AgentSettingsUpdate:
    properties:
      enable_knowledge_tool:
        type: boolean
      enable_web_search:
        type: boolean
      enabled:
        type: boolean
      max_steps:
        type: integer
    type: object
  handler.AgenticRAGSettingsUpdate:
    properties:
      enable_web_fallback:
        type: boolean
      enabled:
        type: boolean
      max_retries:
        type: integer
      max_run_steps:
        type: integer
      quality_threshold:
        type: number
    type: object
  handler.ChatRequest:
    properties:
      document_ids:
        items:
          type: string
        type: array
      enable_long_term:
        type: boolean
      force_citation:
        type: boolean
      knowledge_base_ids:
        items:
          type: string
        type: array
      message:
        type: string
      mode:
        type: string
      query:
        type: string
      session_id:
        type: string
      temperature:
        type: number
      top_k:
        type: integer
      use_agent:
        type: boolean
    type: object
  handler.ChatResponse:
    properties:
      answer:
        type: string
      latency_ms:
        type: integer
      references:
        items:
          $ref: '#/definitions/handler.ReferenceDocument'
        type: array
      session_id:
        type: string
      tokens_used:
        type: integer
    type: object
  handler.EmbeddingSettingsUpdate:
    properties:
      api_key:
        type: string
      base_url:
        type: string
      model:
        type: string
      provider:
        type: string
    type: object
  handler.GraphRAGSettingsUpdate:
    properties:
      enabled:
        type: boolean
      extract_temperature:
        type: number
      max_depth:
        type: integer
      top_k:
        type: integer
    type: object
  handler.KnowledgeBaseRequest:
    properties:
      chunking_config:
        additionalProperties: {}
        type: object
      description:
        type: string
      embedding_dimensions:
        type: integer
      embedding_model_id:
        type: string
      extract_config:
        additionalProperties: {}
        type: object
      name:
        type: string
    required:
    - name
    type: object
  handler.LLMSettingsUpdate:
    properties:
      api_key:
        type: string
      base_url:
        type: string
      max_tokens:
        type: integer
      model:
        type: string
      provider:
        type: string
      temperature:
        type: number
    type: object
  handler.RAGSettingsUpdate:
    properties:
      chunk_overlap:
        type: integer
      chunk_size:
        type: integer
      enable_hybrid:
        type: boolean
      enable_rerank:
        type: boolean
      enable_rewrite:
        type: boolean
      top_k:
        type: integer
    type: object
  handler.ReferenceDocument:
    properties:
      content:
        type: string
      id:
        type: string
      metadata:
        additionalProperties: true
        type: object
      score:
        type: number
      source:
        type: string
    type: object
  handler.RerankerSettingsUpdate:
    properties:
      api_key:
        type: string
      base_url:
        type: string
      enabled:
        type: boolean
      model:
        type: string
      provider:
        type: string
      threshold:
        type: number
      top_k:
        type: integer
    type: object
  handler.SettingsUpdateRequest:
    properties:
      agent:
        $ref: '#/definitions/handler.AgentSettingsUpdate'
      agentic_rag:
        $ref: '#/definitions/handler.AgenticRAGSettingsUpdate'
      embedding:
        $ref: '#/definitions/handler.EmbeddingSettingsUpdate'
      graph_rag:
        $ref: '#/definitions/handler.GraphRAGSettingsUpdate'
      graphrag:
        $ref: '#/definitions/handler.GraphRAGSettingsUpdate'
      llm:
        $ref: '#/definitions/handler.LLMSettingsUpdate'
      rag:
        $ref: '#/definitions/handler.RAGSettingsUpdate'
      reranker:
        $ref: '#/definitions/handler.RerankerSettingsUpdate'
    type: object
  repository.JSON:
    additionalProperties: true
    type: object
  repository.KnowledgeBase:
    properties:
      chunk_count:
        type: integer
      chunking_config:
        $ref: '#/definitions/repository.JSON'
      created_at:
        type: string
      description:
        type: string
      document_count:
        type: integer
      embedding_dimensions:
        type: integer
      embedding_model_id:
        description: nullable FK → models(id)
        type: string
      extract_config:
        $ref: '#/definitions/repository.JSON'
      id:
        type: string
      name:
        type: string
      tenant_id:
        type: integer
      updated_at:
        type: string
    type: object
  repository.Session:
    properties:
      agent_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      knowledge_base_ids:
        items:
          type: string
        type: array
      retrieval_config:
        $ref: '#/definitions/repository.JSON'
      similarity_threshold:
        type: number
      tenant_id:
        type: integer
      title:
        type: string
      top_k:
        type: integer
      updated_at:
        type: string
      user_id:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Eino RAG Agent
  description: 基于字节跳动 Eino 框架的智能知识库问答系统。支持 Pipeline 和 Agentic 两种问答模式。
  license:
    name: Apache 2.0
  title: Eino RAG Agent API
  version: 1.0.0
paths:
  /chat:
    post:
      consumes:
      - application/json
      description: 发送消息并获取 AI 回答，支持 Pipeline 和 Agentic 两种模式
      parameters:
      - description: 聊天请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ChatResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 聊天问答
      tags:
      - 聊天
  /chat/stream:
    post:
      consumes:
      - application/json
      description: 发送消息并通过 Server-Sent Events 获取流式 AI 回答
      parameters:
      - description: 聊天请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE 流
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 流式聊天 (SSE)
      tags:
      - 聊天
  /health:
    get:
      description: 检查服务及各组件状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查
      tags:
      - 系统
  /knowledge-bases:
    get:
      description: 获取当前租户下所有知识库
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 知识库列表
      tags:
      - 知识库
    post:
      consumes:
      - application/json
      description: 创建新的知识库
      parameters:
      - description: 知识库信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.KnowledgeBaseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/repository.KnowledgeBase'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 创建知识库
      tags:
      - 知识库
  /knowledge-bases/{id}:
    delete:
      description: 删除指定知识库及其所有文档
      parameters:
      - description: 知识库 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 删除知识库
      tags:
      - 知识库
    get:
      description: 获取指定知识库的详细信息
      parameters:
      - description: 知识库 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/repository.KnowledgeBase'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 知识库详情
      tags:
      - 知识库
    put:
      consumes:
      - application/json
      description: 更新知识库信息
      parameters:
      - description: 知识库 ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.KnowledgeBaseRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 更新知识库
      tags:
      - 知识库
  /knowledge-bases/{id}/documents:
    get:
      description: 获取知识库下的文档列表
      parameters:
      - description: 知识库 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 文档列表
      tags:
      - 知识库
    post:
      consumes:
      - multipart/form-data
      description: 上传文档到指定知识库，自动解析、分块、向量化
      parameters:
      - description: 知识库 ID
        in: path
        name: id
        required: true
        type: string
      - description: 文档文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 上传文档
      tags:
      - 知识库
  /knowledge-bases/{id}/documents/{docId}:
    delete:
      description: 删除知识库中的指定文档
      parameters:
      - description: 知识库 ID
        in: path
        name: id
        required: true
        type: string
      - description: 文档 ID
        in: path
        name: docId
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 删除文档
      tags:
      - 知识库
  /knowledge-bases/{id}/documents/url:
    post:
      consumes:
      - application/json
      description: 从指定 URL 抓取内容到知识库，自动解析、分块、向量化
      parameters:
      - description: 知识库 ID
        in: path
        name: id
        required: true
        type: string
      - description: URL 导入请求
        in: body
        name: request
        required: true
        schema:
          properties:
            enable_multimodal:
              type: boolean
            title:
              type: string
            url:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 上传网页 URL
      tags:
      - 知识库
  /models:
    get:
      description: 获取所有已配置的 AI 模型（LLM、Embedding、Reranker）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 模型列表
      tags:
      - 模型
    post:
      consumes:
      - application/json
      description: 添加新的模型配置
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 创建模型
      tags:
      - 模型
  /models/{id}:
    delete:
      description: 删除指定模型配置
      parameters:
      - description: 模型 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 删除模型
      tags:
      - 模型
  /sessions:
    get:
      description: 获取所有聊天会话
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 会话列表
      tags:
      - 会话
    post:
      consumes:
      - application/json
      description: 创建新的聊天会话
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/repository.Session'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 创建会话
      tags:
      - 会话
  /sessions/{id}:
    delete:
      description: 删除指定聊天会话
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 删除会话
      tags:
      - 会话
    get:
      description: 获取指定会话的详细信息
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/repository.Session'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 会话详情
      tags:
      - 会话
  /sessions/{id}/messages:
    get:
      description: 获取指定会话的所有消息记录
      parameters:
      - description: 会话 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 会话消息列表
      tags:
      - 会话
  /settings:
    get:
      description: 获取系统配置信息（RAG参数、Agent 配置等）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取设置
      tags:
      - 设置
    put:
      consumes:
      - application/json
      description: 运行时更新系统配置（RAG、Agent、Agentic RAG）
      parameters:
      - description: 要更新的设置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.SettingsUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 更新设置
      tags:
      - 设置
  /system/info:
    get:
      description: 获取系统版本、组件状态等信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 系统信息
      tags:
      - 系统
schemes:
- http
swagger: "2.0"
